apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kueue-openshift-ai
  namespace: grafana
spec:
  resyncPeriod: 5m
  instanceSelector:
    matchLabels:
      dashboards: kueue-grafana
  json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "Prometheus datasource connected to OpenShift Thanos Querier",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__requires": [
        {
          "type": "grafana",
          "id": "grafana",
          "name": "Grafana",
          "version": "9.0.0"
        },
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        },
        {
          "type": "panel",
          "id": "stat",
          "name": "Stat",
          "version": ""
        },
        {
          "type": "panel",
          "id": "timeseries",
          "name": "Time series",
          "version": ""
        },
        {
          "type": "panel",
          "id": "bargauge",
          "name": "Bar gauge",
          "version": ""
        },
        {
          "type": "panel",
          "id": "table",
          "name": "Table",
          "version": ""
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Comprehensive Kueue monitoring dashboard for OpenShift AI. Tracks workload lifecycle, admission latency, resource utilization, queue status, borrowing, and Prometheus scrape health.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Workload Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(kueue_admitted_active_workloads)",
              "legendFormat": "Active Workloads",
              "refId": "A"
            }
          ],
          "title": "Active Workloads",
          "description": "Total number of currently admitted and running workloads across all ClusterQueues.",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(kueue_pending_workloads)",
              "legendFormat": "Pending Workloads",
              "refId": "A"
            }
          ],
          "title": "Pending Workloads",
          "description": "Total workloads waiting in queue for admission. High values indicate capacity pressure.",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(increase(kueue_admitted_workloads_total[24h]))",
              "legendFormat": "Admitted (24h)",
              "refId": "A"
            }
          ],
          "title": "Total Admitted (24h)",
          "description": "Cumulative workloads admitted over the past 24 hours.",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 15 }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(increase(kueue_evicted_workloads_total[24h]))",
              "legendFormat": "Evictions (24h)",
              "refId": "A"
            }
          ],
          "title": "Evictions (24h)",
          "description": "Workloads evicted (preempted) in the last 24 hours. Rising values signal resource contention.",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 6 },
          "id": 101,
          "title": "Workload Lifecycle",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisLabel": "Workloads",
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Admitted" },
                "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Pending" },
                "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Evicted" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 7 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(kueue_admitted_active_workloads) by (cluster_queue)",
              "legendFormat": "Admitted — {{cluster_queue}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(kueue_pending_workloads) by (cluster_queue)",
              "legendFormat": "Pending — {{cluster_queue}}",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(rate(kueue_evicted_workloads_total[5m])) by (cluster_queue) * 60",
              "legendFormat": "Evicted/min — {{cluster_queue}}",
              "refId": "C"
            }
          ],
          "title": "Workloads by ClusterQueue",
          "description": "Active, pending, and eviction rate per ClusterQueue over time.",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 1 }
                ]
              },
              "mappings": [
                { "options": { "0": { "text": "Terminated" }, "1": { "text": "Active" } }, "type": "value" }
              ],
              "custom": {
                "align": "auto",
                "displayMode": "color-text"
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 7 },
          "id": 6,
          "options": {
            "showHeader": true,
            "footer": { "show": false },
            "sortBy": [{ "displayName": "cluster_queue", "desc": false }]
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "kueue_cluster_queue_status",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "ClusterQueue Status",
          "description": "Current status of each ClusterQueue (Active=1, Terminated=0).",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true, "__name__": true, "instance": true, "job": true },
                "renameByName": {
                  "cluster_queue": "ClusterQueue",
                  "Value": "Status",
                  "status": "Condition"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 15 },
          "id": 102,
          "title": "Admission Latency",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisLabel": "Seconds",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "line+area" }
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "transparent", "value": null },
                  { "color": "red", "value": 120 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "p99" },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "p95" },
                "properties": [{ "id": "color", "value": { "fixedColor": "purple", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "p50" },
                "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean", "max"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "histogram_quantile(0.99, sum(rate(kueue_admission_wait_time_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "histogram_quantile(0.95, sum(rate(kueue_admission_wait_time_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "histogram_quantile(0.50, sum(rate(kueue_admission_wait_time_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "C"
            }
          ],
          "title": "Admission Wait Time (p50 / p95 / p99)",
          "description": "Histogram quantiles of how long workloads wait before being admitted. The red threshold line marks 120s.",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisLabel": "Seconds",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 8,
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "histogram_quantile(0.95, sum(rate(kueue_admission_wait_time_seconds_bucket[5m])) by (le, cluster_queue))",
              "legendFormat": "p95 — {{cluster_queue}}",
              "refId": "A"
            }
          ],
          "title": "Admission Latency p95 by ClusterQueue",
          "description": "Per-queue breakdown of p95 admission latency to identify bottleneck queues.",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 24 },
          "id": 103,
          "title": "Resource Utilization & Quota",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "orange", "value": 0.85 },
                  { "color": "red", "value": 0.95 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 25 },
          "id": 9,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true,
            "minVizWidth": 8,
            "minVizHeight": 16,
            "namePlacement": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "kueue_cluster_queue_resource_usage / kueue_cluster_queue_nominal_quota",
              "legendFormat": "{{cluster_queue}} — {{resource}} ({{flavor}})",
              "refId": "A"
            }
          ],
          "title": "Resource Usage / Nominal Quota",
          "description": "Current resource consumption as a percentage of the configured nominal quota per ClusterQueue, resource type, and flavor.",
          "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisLabel": "",
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 25 },
          "id": 10,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "kueue_cluster_queue_resource_usage",
              "legendFormat": "{{cluster_queue}} — {{resource}} ({{flavor}})",
              "refId": "A"
            }
          ],
          "title": "Resource Usage Over Time (Stacked)",
          "description": "Stacked area chart showing absolute resource consumption across all ClusterQueues over time.",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "purple", "value": 0.5 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 33 },
          "id": 11,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true,
            "minVizWidth": 8,
            "minVizHeight": 16,
            "namePlacement": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "kueue_cluster_queue_borrowing_usage / kueue_cluster_queue_borrowing_limit > 0",
              "legendFormat": "{{cluster_queue}} — {{resource}} ({{flavor}})",
              "refId": "A"
            }
          ],
          "title": "Borrowing Usage / Borrowing Limit",
          "description": "How much of the allowed borrowing limit each ClusterQueue is currently consuming. Only queues actively borrowing are shown.",
          "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisLabel": "Nominal Quota",
                "drawStyle": "line",
                "fillOpacity": 0,
                "gradientMode": "none",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 33 },
          "id": 12,
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "kueue_cluster_queue_nominal_quota",
              "legendFormat": "{{cluster_queue}} — {{resource}} ({{flavor}})",
              "refId": "A"
            }
          ],
          "title": "Nominal Quota Configuration",
          "description": "Configured nominal quota values per ClusterQueue. Step-after interpolation shows when quota changes are applied.",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 40 },
          "id": 104,
          "title": "Throughput & Rates",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisLabel": "Workloads / min",
                "drawStyle": "bars",
                "fillOpacity": 80,
                "gradientMode": "scheme",
                "lineWidth": 0,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
